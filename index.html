<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale + user-scalable disable iOS auto-zoom (e.g. on input
         focus), which otherwise shifts the visual viewport and throws off
         pointer-based drag/drop. In-app zoom uses --text-scale (font-size),
         not viewport scale, so it is unaffected. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/order-glass.svg" />
    <title>Order</title>
    <script>
      // Set the theme before first paint to avoid a flash. The saved value is
      // a PREFERENCE; "auto" (the default) resolves to the OS light/dark here,
      // and theme.ts keeps it in sync live afterwards.
      try {
        var pref = localStorage.getItem("order.theme") || "auto";
        var resolved = (pref === "auto")
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : pref;
        document.documentElement.dataset.theme = resolved;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
