<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale + user-scalable disable iOS auto-zoom (e.g. on input
         focus), which otherwise shifts the visual viewport and throws off
         pointer-based drag/drop. In-app zoom uses --text-scale (font-size),
         not viewport scale, so it is unaffected. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Order</title>
    <script>
      // Set the theme before first paint to avoid a light flash.
      try {
        var t = localStorage.getItem("order.theme");
        if (t !== "light" && t !== "dark" && t !== "black")
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
