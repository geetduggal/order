<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./order-glass.svg" />
    <title>Order</title>
    <script>
      // Published viewer always lands in light theme. The in-session
      // theme toggle still works, but every fresh page load resets to
      // light so the published page has a predictable, friendly default
      // regardless of OS preference or what was saved last visit.
      document.documentElement.dataset.theme = "light";
    </script>
  </head>
  <body>
    <div id="viewer-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
