<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Order</title>
    <script>
      // Set the theme before first paint to avoid a light flash. Visitors
      // with no saved choice get their OS preference.
      try {
        var t = localStorage.getItem("order.theme");
        if (t !== "light" && t !== "dark")
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="viewer-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
