<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="./order-glass.svg" />
    <title>Order</title>
    <script>
      // The published viewer follows the visitor's OS light/dark by default
      // ("auto"); a saved override (from the in-session toggle) wins. Resolved
      // before first paint to avoid a flash; theme.ts keeps it live afterwards.
      try {
        var pref = localStorage.getItem("order.theme") || "auto";
        var resolved = (pref === "auto")
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : pref;
        document.documentElement.dataset.theme = resolved;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="viewer-root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
